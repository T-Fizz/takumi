# Takumi Runbook Benchmarks — Deterministic Tests
#
# Runs each scenario (new project, onboard Go, onboard Python) and checks that
# every step succeeded. These tests validate that the user-facing documentation
# produces working results when followed literally.
#
# Usage:
#   cd tests/benchmark
#   TAKUMI_BIN=../../build/takumi npx --yes promptfoo@latest eval --no-cache
#
# Or from repo root:
#   make benchmark

description: "Takumi Runbook Benchmarks — Deterministic"

providers:
  - id: exec:bash run-scenario.sh new-project
    label: new-project
    config:
      timeoutMs: 300000

  - id: exec:bash run-scenario.sh onboard-golang
    label: onboard-golang
    config:
      timeoutMs: 300000

  - id: exec:bash run-scenario.sh onboard-python
    label: onboard-python
    config:
      timeoutMs: 300000

  - id: exec:bash run-scenario.sh agent-discovery
    label: agent-discovery
    config:
      timeoutMs: 300000

  - id: exec:bash run-scenario.sh agent-setup
    label: agent-setup
    config:
      timeoutMs: 300000

  - id: exec:bash run-scenario.sh mid-session
    label: mid-session
    config:
      timeoutMs: 300000

prompts:
  - "{{scenario}}"

tests:
  # ─── New Project (getting-started.md) ───────────────────────────────────────

  - description: "new-project: all steps pass"
    vars:
      scenario: new-project
    providers: [new-project]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "new-project: workspace initialized"
    vars:
      scenario: new-project
    providers: [new-project]
    assert:
      - type: contains
        value: "found: takumi.yaml"
      - type: contains
        value: "found: takumi-pkg.yaml"
      - type: contains
        value: "found: .takumi/"

  - description: "new-project: validate succeeds"
    vars:
      scenario: new-project
    providers: [new-project]
    assert:
      - type: contains
        value: "STEP 6: Validate"
      - type: regex
        value: "STEP 6.*[\\s\\S]*PASS"

  - description: "new-project: build produces binary"
    vars:
      scenario: new-project
    providers: [new-project]
    assert:
      - type: contains
        value: "STEP 10: Verify build"
      - type: contains
        value: "build/my-project"

  - description: "new-project: caching works on rebuild"
    vars:
      scenario: new-project
    providers: [new-project]
    assert:
      - type: contains
        value: "STEP 13: Rebuild"
      - type: regex
        value: "(cached|PASS)"

  # ─── Onboard Go Monorepo (onboarding-existing-project.md) ──────────────────

  - description: "onboard-golang: all steps pass"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "onboard-golang: 3 packages discovered"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang]
    assert:
      - type: contains
        value: "internal"
      - type: contains
        value: "samplecmd"
      - type: contains
        value: "samplesvc"

  - description: "onboard-golang: dependency graph has correct structure"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang]
    assert:
      - type: contains
        value: "Level 0"
      - type: regex
        value: "3 packages"

  - description: "onboard-golang: builds produce binaries"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang]
    assert:
      - type: contains
        value: "found: build/samplecmd"
      - type: contains
        value: "found: build/samplesvc"

  - description: "onboard-golang: caching works on rebuild"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang]
    assert:
      - type: contains
        value: "STEP 16: Rebuild"
      - type: regex
        value: "(cached|PASS)"

  # ─── Onboard Python Monorepo (onboarding-existing-project.md) ──────────────

  - description: "onboard-python: all steps pass"
    vars:
      scenario: onboard-python
    providers: [onboard-python]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "onboard-python: 3 packages discovered"
    vars:
      scenario: onboard-python
    providers: [onboard-python]
    assert:
      - type: contains
        value: "greeter"
      - type: contains
        value: "mycli"
      - type: contains
        value: "server"

  - description: "onboard-python: dependency graph shows server depends on greeter"
    vars:
      scenario: onboard-python
    providers: [onboard-python]
    assert:
      - type: contains
        value: "Level 0"
      - type: regex
        value: "server.*greeter|greeter.*server"

  - description: "onboard-python: build and test succeed"
    vars:
      scenario: onboard-python
    providers: [onboard-python]
    assert:
      - type: contains
        value: "STEP 12: Build"
      - type: contains
        value: "STEP 13: Run tests"
      - type: regex
        value: "syntax OK|py_compile|PASS"

  - description: "onboard-python: caching works on rebuild"
    vars:
      scenario: onboard-python
    providers: [onboard-python]
    assert:
      - type: contains
        value: "STEP 15: Rebuild"
      - type: regex
        value: "(cached|PASS)"

  # ─── Agent Discovery (cold start, no Takumi config) ─────────────────────────

  - description: "agent-discovery: all steps pass"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "agent-discovery: status gives discovery message before init"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "STEP 2"
      - type: contains
        value: "takumi init"

  - description: "agent-discovery: TAKUMI.md has complete command reference"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "found: takumi build"
      - type: contains
        value: "found: takumi test"
      - type: contains
        value: "found: takumi run"
      - type: contains
        value: "found: takumi affected"
      - type: contains
        value: "found: takumi review"

  - description: "agent-discovery: agent can build and test polyglot project"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "STEP 10"
      - type: contains
        value: "2 passed"
      - type: contains
        value: "dependency order"

  - description: "agent-discovery: caching works on rebuild"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "STEP 12"
      - type: contains
        value: "cached"

  - description: "agent-discovery: affected shows cascade from leaf to dependent"
    vars:
      scenario: agent-discovery
    providers: [agent-discovery]
    assert:
      - type: contains
        value: "STEP 13"
      - type: contains
        value: "cascade"

  # ─── Agent Setup (all supported agents) ──────────────────────────────────────

  - description: "agent-setup: all steps pass"
    vars:
      scenario: agent-setup
    providers: [agent-setup]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "agent-setup: every agent gets correct config file"
    vars:
      scenario: agent-setup
    providers: [agent-setup]
    assert:
      - type: contains
        value: "CLAUDE.md exists with include line"
      - type: contains
        value: ".cursor/rules exists with include line"
      - type: contains
        value: "copilot-instructions.md exists with include line"
      - type: contains
        value: ".windsurfrules exists with include line"
      - type: contains
        value: ".clinerules exists with include line"
      - type: contains
        value: "AGENTS.md exists with include line"

  - description: "agent-setup: 'none' skips agent file but creates TAKUMI.md"
    vars:
      scenario: agent-setup
    providers: [agent-setup]
    assert:
      - type: contains
        value: "No agent config file"
      - type: contains
        value: "TAKUMI.md exists"

  - description: "agent-setup: TAKUMI.md structure is identical across all agents"
    vars:
      scenario: agent-setup
    providers: [agent-setup]
    assert:
      - type: contains
        value: "identical TAKUMI.md content"

  - description: "agent-setup: existing config preserved on re-init"
    vars:
      scenario: agent-setup
    providers: [agent-setup]
    assert:
      - type: contains
        value: "Original content preserved"

  # ─── Mid-Session Workflows ─────────────────────────────────────────────────────

  - description: "mid-session: all steps pass"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "ALL PASSED"

  - description: "mid-session: affected shows full cascade (lib→api→web)"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 2"
      - type: contains
        value: "Cascade detected"
      - type: contains
        value: "all 3 affected"

  - description: "mid-session: scoped build and test pass"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 3"
      - type: contains
        value: "3 passed"

  - description: "mid-session: caching works after commit"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 5"
      - type: contains
        value: "cached"

  - description: "mid-session: build failure is visible to agent"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 7"
      - type: contains
        value: "reports failure"

  - description: "mid-session: agent fixes error and rebuild succeeds"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 9"
      - type: contains
        value: "Build succeeds after fix"

  - description: "mid-session: new package validates and appears in graph"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 11"
      - type: contains
        value: "no cycles"
      - type: contains
        value: "4 packages"

  - description: "mid-session: custom phases (lint, deploy) work"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 14"
      - type: contains
        value: "STEP 15"

  - description: "mid-session: status shows all packages at end"
    vars:
      scenario: mid-session
    providers: [mid-session]
    assert:
      - type: contains
        value: "STEP 16"
      - type: contains
        value: "all 4 packages"

  # ─── Cross-scenario: documentation is language-agnostic ─────────────────────

  - description: "both onboard scenarios produce valid workspace status"
    vars:
      scenario: onboard-golang
    providers: [onboard-golang, onboard-python]
    assert:
      - type: contains
        value: "STEP"
      - type: contains
        value: "status"
      - type: regex
        value: "Passed: \\d+"
