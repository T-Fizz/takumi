# Takumi Integration Tests — LLM-Graded
#
# Evaluates whether Takumi's operator prompt and CLI output are high-quality
# inputs for AI agents — clear enough to act on, context-rich enough to avoid
# hallucination, and structured to minimize token waste.
#
# Usage:
#   cd tests/integration/promptfoo
#   ANTHROPIC_API_KEY=sk-... npx promptfoo eval -c promptfooconfig.llm.yaml --no-cache
#
# Or from repo root:
#   make integration-test-llm
#
# Requires: ANTHROPIC_API_KEY environment variable

description: "Takumi Integration Tests — LLM Quality Evaluation"

# Grading model — fast and cheap, only used for rubric judgments
defaultTest:
  options:
    provider: anthropic:messages:claude-haiku-4-5-20251001

providers:
  - id: exec:bash run-takumi-md.sh
    label: operator

  - id: exec:bash run-skill.sh status
    label: status

  - id: exec:bash run-skill.sh build --dry-run
    label: dry-run

prompts:
  - "{{test_name}}"

tests:
  # ═══════════════════════════════════════════════════════════════════
  # Operator Prompt Quality
  # ═══════════════════════════════════════════════════════════════════

  - description: "operator: gives AI a clear, complete command vocabulary"
    vars:
      test_name: operator-vocabulary
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          This is a system prompt that teaches an AI assistant how to operate a
          Takumi workspace. Evaluate whether:
          1. It lists ALL key commands the AI needs (status, build, test, affected, etc.)
          2. Each command has a clear one-line description of when to use it
          3. There's a step-by-step workflow the AI can follow
          4. There are explicit rules/constraints (don't install globally, use takumi checkout, etc.)
          5. An AI reading this could immediately start working without asking
             "what commands are available?" or "how do I build?"
          This should function as a complete operating manual in minimal tokens.

  - description: "operator: complete operating manual in minimal tokens"
    vars:
      test_name: operator-completeness
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          Evaluate this operator prompt as a COMPLETE operating manual for an
          AI agent working in a Takumi workspace. A perfect operator prompt
          should cover ALL of the following scenarios without the agent needing
          any other documentation:
          1. Starting a new session (what to run first)
          2. Building and testing (which commands, not raw tools)
          3. Custom phases (deploy, lint, dev)
          4. Handling failures (what to do when a build fails)
          5. Understanding structure (graph, not grep)
          6. Managing dependencies between packages (config, validate)
          7. Environment management (env setup, not direct install)
          8. Change management (affected, scoped builds)
          9. Scaffolding new packages (init, config creation)
          PASS only if the prompt covers at least 7 of these 9 scenarios
          with specific, actionable instructions. Vague coverage doesn't count.

  # ═══════════════════════════════════════════════════════════════════
  # CLI Output Quality
  # ═══════════════════════════════════════════════════════════════════

  - description: "status: output is structured enough for AI to extract state"
    vars:
      test_name: status-parseability
    providers: [status]
    assert:
      - type: llm-rubric
        value: |
          This is the output of `takumi status` — a workspace health dashboard.
          An AI agent will read this to understand the current state before acting.
          Evaluate whether the output:
          1. Clearly lists all packages with their versions
          2. Shows dependency counts and phase counts per package
          3. Shows recent build results with pass/fail status
          4. Is structured enough that an AI could extract facts like
             "api is at v2.0.1, has 3 phases, depends on 1 package, last build failed"
          The format should be scannable, not a wall of text.

  - description: "dry-run: output lets AI predict build behavior"
    vars:
      test_name: dry-run-predictability
    providers: [dry-run]
    assert:
      - type: llm-rubric
        value: |
          This is the output of `takumi build --dry-run` — an execution plan.
          Evaluate whether an AI agent could use this to:
          1. Understand which packages will run and which are cached
          2. See the exact commands that will execute
          3. Understand the execution order (levels, sequential vs parallel)
          4. Predict the full build behavior without actually running it
          This should be a complete, parseable execution manifest.

  # ═══════════════════════════════════════════════════════════════════
  # Scenario-Based Agent Decision Tests
  #
  # Each test presents a real scenario and evaluates whether the
  # operator prompt would lead an AI agent to the correct Takumi
  # workflow instead of a raw alternative.
  # ═══════════════════════════════════════════════════════════════════

  # ─── Build & Test scenarios ─────────────────────────────────────────
  - description: "scenario: agent sees go.mod → operator steers to takumi build"
    vars:
      test_name: scenario-go-build
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is working in a workspace that contains Go projects with
          go.mod files. The agent needs to compile the code. Given ONLY the
          instructions in this operator prompt, would the agent:
          (a) Run `go build ./...` directly, OR
          (b) Run `takumi build`

          The correct answer is (b). The prompt must EXPLICITLY tell the agent
          to use takumi build instead of go build. Vague hints don't count —
          there must be a clear instruction that says "not go build" or equivalent.
          PASS only if the prompt unambiguously steers toward takumi build.

  - description: "scenario: agent sees package.json → operator steers to takumi build"
    vars:
      test_name: scenario-npm-build
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is in a JavaScript project with package.json. It needs to
          build the frontend. Given ONLY this operator prompt, would the agent:
          (a) Run `npm run build` directly, OR
          (b) Run `takumi build`

          The correct answer is (b). PASS only if the prompt explicitly mentions
          that npm run build should NOT be used and takumi build should be used
          instead.

  - description: "scenario: agent sees pytest.ini → operator steers to takumi test"
    vars:
      test_name: scenario-pytest
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is in a Python project with pytest.ini. It needs to run
          tests. Given ONLY this operator prompt, would the agent:
          (a) Run `pytest` directly, OR
          (b) Run `takumi test`

          The correct answer is (b). PASS only if the prompt explicitly tells
          the agent not to use pytest/go test/vitest directly and to use
          takumi test instead.

  - description: "scenario: agent wants to deploy → operator steers to takumi deploy"
    vars:
      test_name: scenario-deploy
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent needs to deploy the application. Given ONLY this operator
          prompt, would the agent:
          (a) Run `fly deploy` or `vercel deploy` directly, OR
          (b) Run `takumi deploy`

          The correct answer is (b). PASS only if the prompt explicitly mentions
          `takumi deploy` (or `takumi <phase>`) as the way to deploy, and explicitly
          says not to use fly deploy / vercel deploy directly.

  # ─── Setup & Scaffolding scenarios ──────────────────────────────────
  - description: "scenario: new directory without config → operator steers to init"
    vars:
      test_name: scenario-new-dir
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent discovers a new source directory that doesn't have a
          takumi-pkg.yaml file. Given ONLY this operator prompt, would the agent:
          (a) Run build commands directly on the source files, OR
          (b) Create a takumi-pkg.yaml first, or run `takumi init`

          The correct answer is (b). PASS only if the prompt tells the agent
          that new directories need a takumi-pkg.yaml before building, or that
          `takumi init` should be used for scaffolding.

  - description: "scenario: adding package dependency → operator steers to config + validate"
    vars:
      test_name: scenario-add-dep
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is adding a dependency between two packages. Given ONLY
          this operator prompt, would the agent:
          (a) Just import/require the other package in code, OR
          (b) Add the dependency to the `dependencies` list in takumi-pkg.yaml
              and verify with `takumi validate`

          The correct answer is (b). PASS only if the prompt tells the agent to
          add dependencies to the config file and run validate afterward.

  # ─── Failure & Recovery scenarios ───────────────────────────────────
  - description: "scenario: build fails → operator gives recovery workflow"
    vars:
      test_name: scenario-build-failure
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent just ran `takumi build` and it failed. The agent needs to
          understand what went wrong. Given ONLY this operator prompt, does it
          provide a clear recovery path? The prompt should tell the agent:
          1. Where to find failure information (logs, output)
          2. How to fix and re-verify (fix → rebuild → retest)
          PASS if the prompt provides a concrete failure recovery workflow.

  - description: "scenario: config seems wrong → operator steers to validate"
    vars:
      test_name: scenario-config-error
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent suspects a configuration error (maybe a dependency cycle
          or invalid YAML). Given ONLY this operator prompt, would the agent:
          (a) Manually inspect YAML files and trace dependencies, OR
          (b) Run `takumi validate` to check for errors and cycles

          The correct answer is (b). PASS only if the prompt mentions validate
          as the way to check for config errors and cycle detection.

  # ─── Change Management scenarios ────────────────────────────────────
  - description: "scenario: source modified → operator steers to affected before build"
    vars:
      test_name: scenario-source-modified
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent has just modified source code in one package. It needs to
          rebuild. Given ONLY this operator prompt, would the agent:
          (a) Run `takumi build` to rebuild everything, OR
          (b) Run `takumi affected` first to understand blast radius, then
              `takumi build --affected` to build only what changed

          The correct answer is (b). PASS only if the prompt provides a clear
          workflow that includes checking affected before building, and uses
          the --affected flag.

  - description: "scenario: feature complete → operator gives correct ship workflow"
    vars:
      test_name: scenario-ship-workflow
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent has finished implementing a feature across multiple packages.
          Given ONLY this operator prompt, could the agent follow the numbered
          workflow to verify everything works? The workflow should include:
          1. Checking status
          2. Checking what's affected
          3. Building affected packages
          4. Testing affected packages

          PASS if the prompt contains a numbered, sequential workflow that covers
          these steps.

  # ─── Context & Onboarding scenarios ─────────────────────────────────
  - description: "scenario: new session → operator tells agent to status first"
    vars:
      test_name: scenario-new-session
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent just started a new session in this workspace. It has no
          prior context. Given ONLY this operator prompt, would the agent:
          (a) Start reading source files to understand the project, OR
          (b) Run `takumi status` as its very first action

          The correct answer is (b). PASS only if the prompt makes it absolutely
          clear that `takumi status` should be the FIRST thing run in any new
          session. Words like "ALWAYS run first" or equivalent must be present.

  - description: "scenario: agent confused about structure → operator steers to graph"
    vars:
      test_name: scenario-structure
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent doesn't understand how packages relate to each other.
          Given ONLY this operator prompt, would the agent:
          (a) Grep through import statements and require() calls, OR
          (b) Run `takumi graph` to see the dependency DAG

          The correct answer is (b). PASS only if the prompt explicitly mentions
          that graph should be used instead of grepping for imports.

  # ─── Environment scenarios ──────────────────────────────────────────
  - description: "scenario: agent wants to pip install → operator steers to env setup"
    vars:
      test_name: scenario-pip-install
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is working on a Python package and wants to install a new
          dependency. Given ONLY this operator prompt, would the agent:
          (a) Run `pip install requests` directly, OR
          (b) Edit the manifest, then run `takumi env setup`

          The correct answer is (b). PASS only if the prompt explicitly tells the
          agent not to pip install / npm install directly and to use the runtime
          config instead.

  - description: "scenario: agent wants to npm install → operator steers to env setup"
    vars:
      test_name: scenario-npm-install
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          An AI agent is working on a JavaScript package and wants to install
          dependencies. Given ONLY this operator prompt, would the agent:
          (a) Run `npm install` directly, OR
          (b) Edit the manifest, then run `takumi env setup`

          The correct answer is (b). PASS only if the prompt explicitly tells the
          agent not to install directly and to use the runtime config.
