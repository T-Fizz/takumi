# Takumi AI Skills — LLM-Graded Integration Tests
#
# Evaluates whether Takumi's rendered prompts are high-quality inputs for AI
# agents — clear enough to act on, context-rich enough to avoid hallucination,
# and structured to minimize token waste.
#
# Usage:
#   cd tests/integration
#   ANTHROPIC_API_KEY=sk-... npx promptfoo eval -c promptfooconfig.llm.yaml
#
# Or from repo root:
#   make integration-test-llm
#
# Requires: ANTHROPIC_API_KEY environment variable

description: "Takumi AI Skills — LLM Quality Evaluation"

# Grading model — fast and cheap, only used for rubric judgments
defaultTest:
  options:
    provider: anthropic:messages:claude-haiku-4-5-20251001

providers:
  - id: exec:bash run-skill.sh ai diagnose api
    label: diagnose

  - id: exec:bash run-skill.sh ai review
    label: review

  - id: exec:bash run-skill.sh ai optimize
    label: optimize

  - id: exec:bash run-skill.sh ai onboard
    label: onboard

  - id: exec:bash run-skill.sh ai skill run operator
    label: operator

  - id: exec:bash run-skill.sh status
    label: status

  - id: exec:bash run-skill.sh build --dry-run
    label: dry-run

prompts:
  - "{{skill_name}}"

tests:
  # ─── diagnose: can an AI act on this? ───────────────────────────────
  - description: "diagnose prompt gives AI enough context to identify root cause"
    vars:
      skill_name: diagnose
    providers: [diagnose]
    assert:
      - type: llm-rubric
        value: |
          This is a prompt that will be sent to an AI coding assistant to diagnose
          a build failure. Evaluate whether the prompt contains ALL of the following:
          1. The specific package name that failed
          2. The exact error output including file names and line numbers
          3. The build phase that failed (build, test, etc.)
          4. Dependency information so the AI can trace upstream causes
          5. Clear instructions telling the AI what to determine (root cause, files to fix, suggested fix)
          The prompt must be actionable — an AI reading it should be able to start
          diagnosing immediately without asking clarifying questions.

  - description: "diagnose prompt is token-efficient — no unnecessary boilerplate"
    vars:
      skill_name: diagnose
    providers: [diagnose]
    assert:
      - type: llm-rubric
        value: |
          Evaluate this diagnostic prompt for conciseness and signal density.
          It should NOT contain:
          - Lengthy preambles or unnecessary context about what Takumi is
          - Repeated information
          - Vague instructions like "please help" or "try your best"
          It SHOULD be direct, structured, and every line should serve a purpose.
          A good diagnostic prompt gets to the error fast and tells the AI exactly
          what format to respond in.

  # ─── review: structured enough for code review? ─────────────────────
  - description: "review prompt structures context for useful code review"
    vars:
      skill_name: review
    providers: [review]
    assert:
      - type: llm-rubric
        value: |
          This prompt will be sent to an AI to produce a code review summary.
          Evaluate whether it:
          1. Clearly identifies which packages are affected
          2. Includes or references a git diff (or explains it's unavailable)
          3. Asks for specific deliverables (summary, per-package changes, risk areas)
          4. Gives the AI enough structure to produce a review that a human can act on
          The output format should be clear enough that the AI won't ramble.

  # ─── optimize: enough data to give real advice? ─────────────────────
  - description: "optimize prompt provides actionable telemetry data"
    vars:
      skill_name: optimize
    providers: [optimize]
    assert:
      - type: llm-rubric
        value: |
          This prompt asks an AI to analyze build performance. Evaluate whether:
          1. It includes actual build timing data (not just placeholders)
          2. It includes the dependency graph structure
          3. It asks for specific optimization categories (parallelism, skipping, bottlenecks)
          4. The data is concrete enough that the AI can give specific recommendations
             rather than generic advice like "consider caching"
          The AI should be able to point to specific packages and phases.

  # ─── onboard: could an AI operate the workspace from this alone? ────
  - description: "onboard prompt gives complete workspace mental model"
    vars:
      skill_name: onboard
    providers: [onboard]
    assert:
      - type: llm-rubric
        value: |
          This prompt asks an AI to generate a workspace briefing. Evaluate whether
          a NEW AI agent — with zero prior context — could understand the workspace
          from this prompt alone. It must include:
          1. Workspace identity (name, purpose)
          2. All packages with their roles and relationships
          3. The dependency graph showing build order
          4. Enough detail to answer "what does this project do?" and "how do I build it?"
          This is the most important prompt in the system — it bootstraps AI understanding.

  - description: "onboard prompt uses structured data over prose"
    vars:
      skill_name: onboard
    providers: [onboard]
    assert:
      - type: llm-rubric
        value: |
          Evaluate this onboarding prompt for information density. An AI agent's
          context window is expensive. This prompt should:
          1. Include raw config data (YAML, JSON) that an AI can parse — this is
             PREFERRED over narrating the same information in prose
          2. Not repeat the same facts in both prose and data sections
          3. Ask for structured output (numbered lists, specific sections)
          Embedding raw YAML configs is a GOOD practice — it gives the AI parseable
          data rather than a summary that might lose detail. Only rate poorly if
          there is significant redundancy (same info stated multiple times) or if
          the prompt includes lengthy boilerplate unrelated to the workspace.

  # ─── operator: clear workflow instructions? ─────────────────────────
  - description: "operator skill gives AI a clear, complete command vocabulary"
    vars:
      skill_name: operator
    providers: [operator]
    assert:
      - type: llm-rubric
        value: |
          This is a system prompt that teaches an AI assistant how to operate a
          Takumi workspace. Evaluate whether:
          1. It lists ALL key commands the AI needs (status, build, test, affected, etc.)
          2. Each command has a clear one-line description of when to use it
          3. There's a step-by-step workflow the AI can follow
          4. There are explicit rules/constraints (don't install globally, use takumi checkout, etc.)
          5. An AI reading this could immediately start working without asking
             "what commands are available?" or "how do I build?"
          This should function as a complete operating manual in minimal tokens.

  # ─── status: is the dashboard AI-parseable? ─────────────────────────
  - description: "status output is structured enough for AI to extract state"
    vars:
      skill_name: status
    providers: [status]
    assert:
      - type: llm-rubric
        value: |
          This is the output of `takumi status` — a workspace health dashboard.
          An AI agent will read this to understand the current state before acting.
          Evaluate whether the output:
          1. Clearly lists all packages with their versions
          2. Shows dependency counts and phase counts per package
          3. Indicates environment readiness (set up vs not)
          4. Shows recent build results with pass/fail status
          5. Is structured enough that an AI could extract facts like
             "api is at v2.0.1, has 3 phases, depends on 1 package, last build failed"
          The format should be scannable, not a wall of text.

  # ─── dry-run: can AI predict what will happen? ──────────────────────
  - description: "dry-run output lets AI predict build behavior"
    vars:
      skill_name: dry-run
    providers: [dry-run]
    assert:
      - type: llm-rubric
        value: |
          This is the output of `takumi build --dry-run` — an execution plan.
          Evaluate whether an AI agent could use this to:
          1. Understand which packages will run and which are cached
          2. See the exact commands that will execute (pre, cmd, post)
          3. Understand the execution order (levels, sequential vs parallel)
          4. Know what environment variables will be set
          5. Predict the full build behavior without actually running it
          This should be a complete, parseable execution manifest.
