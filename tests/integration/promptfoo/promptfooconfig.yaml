# Takumi Integration Tests
#
# Tests CLI command output and operator prompt (TAKUMI.md) content against the
# fixture workspace. Verifies that commands produce correct output and that the
# operator prompt steers AI agents to use Takumi over raw alternatives.
#
# Usage:
#   cd tests/integration/promptfoo
#   TAKUMI_BIN=../../../build/takumi npx promptfoo eval
#
# Or from repo root:
#   make integration-test

description: "Takumi Integration Tests"

providers:
  # CLI commands — run against fixture workspace
  - id: exec:bash run-skill.sh status
    label: status

  - id: exec:bash run-skill.sh graph
    label: graph

  - id: exec:bash run-skill.sh validate
    label: validate

  - id: exec:bash run-skill.sh build --dry-run
    label: dry-run

  # Operator prompt — reads .takumi/TAKUMI.md directly
  - id: exec:bash run-takumi-md.sh
    label: operator

prompts:
  # promptfoo requires a prompt but exec providers ignore it
  - "{{test_name}}"

tests:
  # ═══════════════════════════════════════════════════════════════════
  # CLI Command Output Tests
  # ═══════════════════════════════════════════════════════════════════

  # ─── status ─────────────────────────────────────────────────────────
  - description: "status: shows workspace name and packages"
    vars:
      test_name: status-dashboard
    providers: [status]
    assert:
      - type: contains
        value: "sample-platform"
      - type: contains
        value: "api"
      - type: contains
        value: "shared-lib"

  - description: "status: shows AI agent configuration"
    vars:
      test_name: status-agent
    providers: [status]
    assert:
      - type: contains
        value: "claude"

  - description: "status: shows build history"
    vars:
      test_name: status-metrics
    providers: [status]
    assert:
      - type: regex
        value: "(pass|fail)"

  # ─── graph ──────────────────────────────────────────────────────────
  - description: "graph: shows dependency levels"
    vars:
      test_name: graph-levels
    providers: [graph]
    assert:
      - type: contains
        value: "Level 0"
      - type: contains
        value: "shared-lib"
      - type: contains
        value: "api"
      - type: regex
        value: "2 packages"

  # ─── validate ───────────────────────────────────────────────────────
  - description: "validate: checks all configs"
    vars:
      test_name: validate-clean
    providers: [validate]
    assert:
      - type: contains
        value: "Validating"
      - type: contains
        value: "valid"
      - type: contains
        value: "no cycles"

  # ─── dry-run ────────────────────────────────────────────────────────
  - description: "dry-run: shows execution plan with packages"
    vars:
      test_name: dry-run-plan
    providers: [dry-run]
    assert:
      - type: contains
        value: "Dry Run"
      - type: contains
        value: "shared-lib"
      - type: contains
        value: "api"
      - type: regex
        value: "(will run|cached)"
      - type: regex
        value: "\\d+ packages?"

  # ═══════════════════════════════════════════════════════════════════
  # Operator Prompt Tests (TAKUMI.md)
  #
  # Verify the operator prompt contains instructions clear enough
  # that an AI agent would choose Takumi over raw alternatives.
  # ═══════════════════════════════════════════════════════════════════

  # ─── Build & Test: prefer takumi over raw tools ─────────────────────
  - description: "operator: agent sees go.mod → told to use takumi build not go build"
    vars:
      test_name: operator-build-go
    providers: [operator]
    assert:
      - type: contains
        value: "takumi build"
      - type: regex
        value: "not.*go build"

  - description: "operator: agent sees package.json → told to use takumi build not npm"
    vars:
      test_name: operator-build-npm
    providers: [operator]
    assert:
      - type: contains
        value: "takumi build"
      - type: contains
        value: "npm run build"

  - description: "operator: agent sees pytest → told to use takumi test not pytest"
    vars:
      test_name: operator-test
    providers: [operator]
    assert:
      - type: contains
        value: "takumi test"
      - type: regex
        value: "(not pytest|not.*go test|not.*vitest)"

  - description: "operator: agent wants custom phase → told to use takumi <phase> directly"
    vars:
      test_name: operator-run-phase
    providers: [operator]
    assert:
      - type: regex
        value: "takumi (deploy|lint|<phase>)"
      - type: regex
        value: "(deploy|lint|dev)"

  # ─── Setup & Scaffolding ────────────────────────────────────────────
  - description: "operator: no config → told to create takumi-pkg.yaml or run init"
    vars:
      test_name: operator-init
    providers: [operator]
    assert:
      - type: contains
        value: "takumi-pkg.yaml"
      - type: contains
        value: "takumi init"

  - description: "operator: adding dependency → told to add to config and validate"
    vars:
      test_name: operator-deps
    providers: [operator]
    assert:
      - type: contains
        value: "dependencies"
      - type: contains
        value: "takumi validate"

  - description: "operator: config changed → told to run validate"
    vars:
      test_name: operator-config-change
    providers: [operator]
    assert:
      - type: contains
        value: "takumi validate"
      - type: contains
        value: "check for errors"

  # ─── Failure & Recovery ─────────────────────────────────────────────
  - description: "operator: build fails → told to read logs"
    vars:
      test_name: operator-failure
    providers: [operator]
    assert:
      - type: contains
        value: ".takumi/logs/"
      - type: contains
        value: "On failure"

  - description: "operator: failure workflow is step 5"
    vars:
      test_name: operator-workflow-failure
    providers: [operator]
    assert:
      - type: contains
        value: "On failure"
      - type: contains
        value: "repeat from 3"

  - description: "operator: config invalid → told to run validate"
    vars:
      test_name: operator-validate
    providers: [operator]
    assert:
      - type: contains
        value: "takumi validate"
      - type: contains
        value: "errors and cycles"

  # ─── Change Management ─────────────────────────────────────────────
  - description: "operator: agent modifies source → told to check affected first"
    vars:
      test_name: operator-affected
    providers: [operator]
    assert:
      - type: contains
        value: "takumi affected"
      - type: contains
        value: "before building"

  - description: "operator: workflow uses --affected for scoped builds"
    vars:
      test_name: operator-scoped-build
    providers: [operator]
    assert:
      - type: contains
        value: "build --affected"
      - type: contains
        value: "test --affected"

  # ─── Context & Onboarding ──────────────────────────────────────────
  - description: "operator: new session → told to run status first"
    vars:
      test_name: operator-session-start
    providers: [operator]
    assert:
      - type: contains
        value: "ALWAYS run first"
      - type: contains
        value: "takumi status"
      - type: contains
        value: "new session"

  - description: "operator: project structure → told to use graph not grep"
    vars:
      test_name: operator-graph
    providers: [operator]
    assert:
      - type: contains
        value: "takumi graph"
      - type: regex
        value: "not.*grep"

  - description: "operator: status is step 1 in the workflow"
    vars:
      test_name: operator-workflow-start
    providers: [operator]
    assert:
      - type: regex
        value: "1\\..*takumi status"

  # ─── Environment ───────────────────────────────────────────────────
  - description: "operator: runtime → told to use env setup for interpreted languages"
    vars:
      test_name: operator-env
    providers: [operator]
    assert:
      - type: contains
        value: "takumi env setup"
      - type: contains
        value: "Python, Node, Ruby"

  - description: "operator: dependency install → edit manifest then env setup"
    vars:
      test_name: operator-runtime
    providers: [operator]
    assert:
      - type: icontains
        value: "edit the manifest"
      - type: contains
        value: "takumi env setup"
      - type: contains
        value: "Prefer this over raw"

  - description: "operator: compiled languages don't need env setup"
    vars:
      test_name: operator-compiled
    providers: [operator]
    assert:
      - type: contains
        value: "Compiled languages"
      - type: contains
        value: "fetch deps at build time"
      - type: contains
        value: ".takumi/envs/"

  # ─── When Raw Tools ARE Appropriate ─────────────────────────────────
  - description: "operator: interactive/REPL work is ok with raw tools"
    vars:
      test_name: operator-raw-repl
    providers: [operator]
    assert:
      - type: regex
        value: "REPL|Interactive"
      - type: regex
        value: "python.*node|`python`.*`node`"

  - description: "operator: git operations are outside Takumi's scope"
    vars:
      test_name: operator-raw-git
    providers: [operator]
    assert:
      - type: regex
        value: "[Gg]it.*outside.*scope|VCS.*outside.*scope"

  - description: "operator: raw tools ok when no workspace exists yet"
    vars:
      test_name: operator-raw-no-workspace
    providers: [operator]
    assert:
      - type: regex
        value: "No takumi.yaml|no takumi.yaml"
      - type: regex
        value: "raw tools|takumi init"

  - description: "operator: user explicit raw command request is respected"
    vars:
      test_name: operator-raw-explicit
    providers: [operator]
    assert:
      - type: regex
        value: "[Uu]ser.*explicit|[Uu]ser.*request.*raw|[Uu]ser.*specific.*raw"

  # ─── Lint & Deploy Phases ──────────────────────────────────────────
  - description: "operator: lint → told to use takumi lint not raw linter"
    vars:
      test_name: operator-lint
    providers: [operator]
    assert:
      - type: contains
        value: "takumi lint"
      - type: regex
        value: "not.*eslint|not.*ruff"

  - description: "operator: deploy → told to use takumi deploy not raw deploy"
    vars:
      test_name: operator-deploy
    providers: [operator]
    assert:
      - type: contains
        value: "takumi deploy"
      - type: regex
        value: "not.*fly deploy|not.*vercel deploy"

  # ─── Checkout Rule ─────────────────────────────────────────────────
  - description: "operator: told to use takumi checkout not git clone"
    vars:
      test_name: operator-checkout
    providers: [operator]
    assert:
      - type: contains
        value: "takumi checkout"
      - type: contains
        value: "not git clone"

  # ─── Completeness ──────────────────────────────────────────────────
  - description: "operator: never use raw build commands rule"
    vars:
      test_name: operator-no-raw-builds
    providers: [operator]
    assert:
      - type: contains
        value: "Never build/test with raw language commands"
      - type: contains
        value: "dependency order and caching"

  - description: "operator: review command is listed"
    vars:
      test_name: operator-review
    providers: [operator]
    assert:
      - type: contains
        value: "takumi review"
      - type: contains
        value: "code review"
