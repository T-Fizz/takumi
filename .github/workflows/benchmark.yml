name: Benchmark

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to benchmark (e.g. v1.0.2). Defaults to latest tag."
        required: false

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Resolve version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Benchmarking version: $TAG"

      - name: Build Takumi
        run: make build

      - name: Run performance benchmarks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAKUMI_BIN: build/takumi
          BENCH_MODEL: claude-sonnet-4-6
        run: python3 tests/benchmark/perf/benchmark.py

      - name: Update benchmarks page
        run: |
          python3 tests/benchmark/perf/update-benchmarks-page.py \
            --version "${{ steps.version.outputs.tag }}"

      - name: Commit updated benchmarks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dev/benchmarks.md
          git diff --cached --quiet && echo "No benchmark changes" && exit 0
          git commit -m "benchmark: add ${{ steps.version.outputs.tag }} performance results"
          git push origin main

      - name: Upload results as release artifact
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" \
              tests/benchmark/perf/results.json#benchmark-results.json \
              --clobber
          fi
