version: 2
project_name: takumi

before:
  hooks:
    - go mod tidy

builds:
  - id: takumi
    binary: takumi
    main: ./cmd/takumi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/tfitz/takumi/src/cli.version={{.Version}}

  - id: t
    binary: t
    main: ./cmd/takumi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/tfitz/takumi/src/cli.version={{.Version}}

archives:
  - id: default
    builds:
      - takumi
      - t
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  github:
    owner: T-Fizz
    name: takumi
