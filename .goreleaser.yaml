version: 2
project_name: takumi

before:
  hooks:
    - go mod tidy

builds:
  - id: takumi
    binary: takumi
    main: ./cmd/takumi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/tfitz/takumi/src/cli.version={{.Version}}

archives:
  - id: default
    builds:
      - takumi
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

brews:
  - repository:
      owner: T-Fizz
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: takumi
    homepage: https://github.com/T-Fizz/takumi
    description: "AI-aware, language-agnostic workspace builder"
    license: AGPL-3.0
    install: |
      bin.install "takumi"
      bin.install_symlink bin/"takumi" => "t"
    test: |
      assert_match "takumi", shell_output("#{bin}/takumi --help")

release:
  github:
    owner: T-Fizz
    name: takumi
