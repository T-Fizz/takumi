skill:
  name: optimize
  description: "Analyze build telemetry and suggest speed improvements"

  auto_context:
    - build_metrics
    - package_graph

  prompt: |
    Analyze this Takumi workspace's build performance.

    Build times (last 10 runs): {{build_metrics}}
    Dependency graph: {{package_graph}}

    Identify:
    1. Slowest packages and why
    2. Parallelism opportunities (packages that could build concurrently)
    3. Phases that could be skipped (no changes since last success)
    4. Specific commands or phases to optimize

  max_tokens: 600
