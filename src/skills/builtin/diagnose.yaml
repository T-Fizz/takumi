skill:
  name: diagnose
  description: "Triage build/test failure — determine root cause and suggest fix"

  auto_context:
    - last_error_output
    - changed_files
    - dependency_chain
    - package_config
    - env_status

  prompt: |
    Diagnose this Takumi build failure.

    Package: {{package_name}}
    Phase: {{phase}}
    Exit code: {{exit_code}}

    Error output:
    ```
    {{error_output}}
    ```

    Files changed since last success:
    {{changed_files}}

    Dependencies: {{dependency_chain}}
    Env: {{env_status}}

    Determine:
    1. Root cause category: syntax | missing-dep | version-conflict | env | config | test-regression
    2. Exact file(s) + line(s) to fix
    3. Suggested fix (code or command)

    Be specific. No hedging.

  output_format: structured
  max_tokens: 500
