skill:
  name: review
  description: "Summarize workspace changes for code review"

  auto_context:
    - git_diff
    - affected_packages
    - test_results

  prompt: |
    Summarize these changes for code review.

    Affected packages: {{affected_packages}}

    Diff:
    {{git_diff}}

    Test results:
    {{test_results}}

    Provide:
    1. One-line summary
    2. Per-package: what changed and why it matters
    3. Risk areas (breaking changes, missing tests, version impacts)
    4. Suggested reviewers (based on package ownership in takumi-pkg.yaml)

  max_tokens: 800
